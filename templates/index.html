<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Premium Styles -->
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>

<body>

    <div class="container py-5 d-flex flex-column align-items-center justify-content-center min-vh-100">

        <div class="glass-card p-5 w-100" style="max-width: 800px;">

            <div class="text-center mb-5">
                <h1 class="display-5 text-gradient mb-2">
                    🤖 AI Resume Analyzer
                </h1>
                <p class="text-secondary">Get instant matching score and professional optimization tips powered by Gemini</p>
            </div>

            <form action="/analyze" method="POST" enctype="multipart/form-data">

                <!-- Resume Upload -->
                <div class="mb-4">
                    <label class="form-label fw-bold text-gradient mb-2">
                        Upload Resume (PDF only)
                    </label>
                    <input type="file" name="resume" class="form-control form-control-premium" accept=".pdf" required>
                </div>

                <!-- Job Description -->
                <div class="mb-4">
                    <label class="form-label fw-bold text-gradient mb-2">
                        Job Description
                    </label>
                    <textarea name="job_description" class="form-control form-control-premium" rows="8"
                        placeholder="Paste the target job description details here..." required></textarea>
                </div>

                <!-- Submit Button -->
                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-premium btn-lg py-3">
                        🚀 Analyze Resume Match
                    </button>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
